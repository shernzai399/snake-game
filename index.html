<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Snake</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="game-shell">
      <section class="game-panel" aria-label="Snake game">
        <header class="hud">
          <div>
            <p class="eyebrow">Classic Snake</p>
            <h1>Snake</h1>
          </div>
          <div class="scoreboard" aria-live="polite">
            <span>Score <strong id="score">0</strong></span>
            <span>Best <strong id="best">0</strong></span>
          </div>
        </header>

        <div class="board-wrap">
          <canvas id="board" width="560" height="560" aria-label="Snake play area"></canvas>
          <div class="overlay" id="overlay">
            <h2 id="overlay-title">Ready?</h2>
            <p id="overlay-text">Enter your name, then press Start.</p>
          </div>
        </div>

        <form class="player-form" id="player-form">
          <label for="player-name">Player name</label>
          <div class="name-row">
            <input id="player-name" name="player-name" type="text" maxlength="16" autocomplete="nickname" placeholder="Your name">
            <button type="submit">Save Name</button>
          </div>
          <p id="player-status">No player yet</p>
        </form>

        <div class="controls">
          <button id="start" type="button">Start</button>
          <button id="pause" type="button">Pause</button>
          <button id="restart" type="button">Restart</button>
        </div>

        <section class="leaderboard" aria-labelledby="leaderboard-title">
          <div class="leaderboard-head">
            <h2 id="leaderboard-title">All Players Score Board</h2>
            <button id="clear-board" type="button">Clear</button>
          </div>
          <ol id="leaderboard-list"></ol>
        </section>

        <div class="dpad" aria-label="Touch controls">
          <button class="dir up" type="button" data-dir="up" aria-label="Move up">&uarr;</button>
          <button class="dir left" type="button" data-dir="left" aria-label="Move left">&larr;</button>
          <button class="dir right" type="button" data-dir="right" aria-label="Move right">&rarr;</button>
          <button class="dir down" type="button" data-dir="down" aria-label="Move down">&darr;</button>
        </div>
      </section>
    </main>

    <script src="game.js"></script>
  </body>
</html>
